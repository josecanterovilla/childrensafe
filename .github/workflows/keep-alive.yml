name: Keep backend awake

# Evita el "cold start" del plan gratuito de Render (duerme tras ~15 min de inactividad):
# pinga el healthcheck cada 10 minutos para mantener el backend despierto y rápido.
# Nota: el cron de GitHub Actions puede retrasarse en momentos de carga; para máxima
# fiabilidad puede complementarse con un monitor externo (p. ej. UptimeRobot cada 5 min).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sS -m 60 https://childrensafe-api.onrender.com/api/health -w "\n[HTTP %{http_code} | %{time_total}s]\n" || true
