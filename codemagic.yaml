  #     - (cd apps/shared && flutter pub get)
  #     - cd apps/parent && flutter pub get
  #     - cd apps/parent && flutter build ipa --release --dart-define=API_BASE_URL=$API_BASE_URL --dart-define=GOOGLE_SERVER_CLIENT_ID=$GOOGLE_SERVER_CLIENT_ID
