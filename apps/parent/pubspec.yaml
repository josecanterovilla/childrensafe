name: childrensafe_parent
description: ChildrenSafe — app del tutor (padre/madre/tutor).
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  childrensafe_shared:
    path: ../shared
  google_sign_in: ^6.2.1
  qr_flutter: ^4.1.0       # QR del código de emparejamiento
  flutter_map: ^7.0.2      # mapa con OpenStreetMap (sin API key)
  latlong2: ^0.9.1         # coordenadas para flutter_map
  url_launcher: ^6.3.1     # abrir la ubicación en la app de mapas del sistema

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
