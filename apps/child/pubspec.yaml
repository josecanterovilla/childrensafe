name: childrensafe_child
description: ChildrenSafe — app del menor (transparente y simple).
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  childrensafe_shared:
    path: ../shared
  geolocator: ^13.0.1               # ubicación + permisos del sistema
  device_info_plus: ^11.1.0         # nombre/plataforma del dispositivo
  battery_plus: ^6.2.0              # nivel de batería para alertas
  flutter_secure_storage: ^9.2.2    # persiste el UUID estable del dispositivo

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
